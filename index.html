<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMBY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0F1115;
color:#fff;
font-family:'Inter',sans-serif;
padding:30px;
}

.header{
text-align:center;
margin-bottom:40px;
}

.logo{
font-size:60px;
font-weight:800;
}

.tagline{
color:#A1A1AA;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#171A21;
padding:25px;
border-radius:18px;
text-align:center;
}

.card h2{
font-size:42px;
}

.card p{
color:#A1A1AA;
margin-top:10px;
}

.feed{
display:grid;
gap:15px;
}

.feed-item{
background:#171A21;
padding:20px;
border-radius:16px;
}
  button{
background:#171A21;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#252B38;
}

.rank{
display:flex;
justify-content:space-between;
align-items:center;
}

.award{
color:#D4AF37;
font-weight:700;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">AMBY</div>
<div class="tagline">
Tracking Creativity Worldwide
</div>
</div>

<div class="stats">

<div class="card">
<h2 id="totalAwards">0</h2>
<p>Total Awards</p>
</div>

<div class="card">
<h2 id="goldAwards">0</h2>
<p>Gold</p>
</div>

<div class="card">
<h2 id="silverAwards">0</h2>
<p>Silver</p>
</div>

<div class="card">
<h2 id="bronzeAwards">0</h2>
<p>Bronze</p>
</div>

</div>
<h2 style="margin-bottom:15px;">Agency Leaderboard</h2>

<div id="leaderboard" class="feed"></div>

<br>

<input
id="search"
type="text"
placeholder="Search Agency, Brand or Campaign"
style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#171A21;
color:white;
margin-bottom:20px;
font-size:16px;
">

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px;">
<button onclick="filterAwards('All')">All</button>
<button onclick="filterAwards('Gold')">Gold</button>
<button onclick="filterAwards('Silver')">Silver</button>
<button onclick="filterAwards('Bronze')">Bronze</button>
</div>
<h2 style="margin-bottom:20px;">Live Feed</h2>

<div class="feed" id="feed"></div>

<script>
const sheetURL =
'https://opensheet.elk.sh/15vLafkmdQXueHBTb7ks9xG640MI2Ds8tedRYlIveU9s/Sheet1';

let awards=[];

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

awards=data;

renderDashboard(data);

});

function renderDashboard(data){

document.getElementById('totalAwards').innerText=data.length;

document.getElementById('goldAwards').innerText=
data.filter(x=>x.Award==="Gold").length;

document.getElementById('silverAwards').innerText=
data.filter(x=>x.Award==="Silver").length;

document.getElementById('bronzeAwards').innerText=
data.filter(x=>x.Award==="Bronze").length;

renderFeed(data);
renderLeaderboard(data);

}

function renderLeaderboard(data){

let agencyCount={};

data.forEach(item=>{

agencyCount[item.Agency]=
(agencyCount[item.Agency]||0)+1;

});

let sorted=
Object.entries(agencyCount)
.sort((a,b)=>b[1]-a[1]);

let html='';

sorted.forEach((agency,index)=>{

html += `

<div class="feed-item">
<div class="rank">
<h3>${index+1}. ${agency[0]}</h3>
<strong>${agency[1]}</strong>
</div>
</div>
`;

});

document.getElementById('leaderboard').innerHTML=html;

}

function renderFeed(data){

const feed=document.getElementById('feed');

feed.innerHTML='';

data.slice().reverse().forEach(item=>{

let medal='🏆';

if(item.Award==="Gold") medal='🥇';
if(item.Award==="Silver") medal='🥈';
if(item.Award==="Bronze") medal='🥉';

feed.innerHTML += `

<div class="feed-item">
<h3>${medal} ${item.Agency}</h3>
<p><strong>Brand:</strong> ${item.Brand}</p>
<p><strong>Campaign:</strong> ${item.Campaign}</p>
<p><strong>Category:</strong> ${item.Category}</p>
<p class="award">${item.Award}</p>
</div>
`;

});

}

document.addEventListener('input',(e)=>{

if(e.target.id==='search'){

let term=e.target.value.toLowerCase();

let filtered=awards.filter(item=>

item.Agency.toLowerCase().includes(term) ||
item.Brand.toLowerCase().includes(term) ||
item.Campaign.toLowerCase().includes(term)

);

renderFeed(filtered);

}

});

function filterAwards(type){

if(type==='All'){

renderFeed(awards);
return;

}

let filtered=
awards.filter(item=>item.Award===type);

renderFeed(filtered);

}

setInterval(()=>{
location.reload();
},30000);

</script>

</body>
</html>
